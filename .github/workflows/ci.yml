name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (no PAW index needed - the model is never called in CI)
        run: |
          python -m pip install --upgrade pip
          # Install the package without deps so CI does not pull the PAW index;
          # the tests run offline and `programasweights` is imported lazily.
          pip install -e . --no-deps
          pip install "pyyaml>=6" "fastapi>=0.110" "uvicorn>=0.27" "pydantic>=2.5" "httpx>=0.27" "pytest>=8" "ruff>=0.4"
      - name: Lint
        run: ruff check paw_helper
      - name: Test
        run: pytest -q
      - name: Validate the example content pack
        run: paw-helper validate --content examples/minimal
